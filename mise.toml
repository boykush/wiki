[tools]
"github:boykush/scraps" = "v1.0.1"
uv = "latest"
zizmor = "1.26.1"

[env]
SCRAPS_DIRECTORY = "{{config_root}}/scraps"

[tasks.build]
description = "Build static site from Markdown files"
run = '"$(mise which scraps)" build'

[tasks.serve]
description = "Serve the wiki locally at http://127.0.0.1:1112"
run = '"$(mise which scraps)" serve'

[tasks."actions:audit"]
description = "Audit GitHub Actions workflows for security issues with zizmor"
run = "zizmor .github/workflows/"

