# Managed by Terraform (boykush/github-management): this file is distributed by
# the github_repository_file resource. Edits made directly in a target repo are
# overwritten on the next `terraform apply` — change templates/zizmor.yml instead.
name: zizmor

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default; the job grants only what zizmor needs.
permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      actions: read # read workflow definitions (needed for private repos)
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false # zizmor: avoid token persistence (artipacked)
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          # Plain mode: zizmor fails the job on any finding (no SARIF upload to
          # GitHub code scanning). Uniform across all managed repos — keeps the
          # shared template simple even though public repos could use code scanning.
          advanced-security: false
          annotations: true
          # Fanned out to every owned repo, including ones with no workflows yet.
          # Without this, zizmor exits 3 ("no inputs collected") and reds their CI;
          # false makes it pass with a warning until the repo grows a workflow.
          fail-on-no-inputs: false
