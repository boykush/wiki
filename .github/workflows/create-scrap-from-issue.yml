name: Create Scrap from Issue
on:
  issues:
    types: [opened, reopened]

jobs:
  create-scrap:
    if: github.event.issue.user.login == 'boykush'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install scraps
        run: mise install github:boykush/scraps

      - name: Run Claude with ingest skill
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/boykush/scraps.git
          plugins: |
            scraps@scraps-claude-code-plugins
          settings: ".claude/settings.json"
          claude_args: --model claude-opus-4-7 --allowed-tools "WebFetch,Read,Write,Edit,Glob,Bash,Skill"
          prompt: |
            /ingest ${{ github.event.issue.title }}

            追加情報:
            ${{ github.event.issue.body }}

      - name: Create Pull Request
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          BRANCH_NAME="add-scrap/issue-${ISSUE_NUMBER}-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"

          git add scraps/
          if git diff --cached --quiet; then
            echo "No changes to commit (ingest may have skipped)"
            exit 0
          fi
          git commit -m "Add scrap: ${ISSUE_TITLE}"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Add scrap: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --base main
