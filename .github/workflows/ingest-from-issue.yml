name: Ingest from Issue
on:
  issues:
    types: [labeled]

jobs:
  create-scrap:
    if: github.event.label.name == 'ingest' && github.event.issue.user.login == 'boykush'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Scraps
        uses: boykush/scraps@a8bf05b091898d347535c052707d7b77b2a74274 # v1.0.1

      - name: Run Claude with ingest skill
        env:
          SCRAPS_DIRECTORY: scraps
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/boykush/scraps.git
          plugins: |
            scraps@scraps-claude-code-plugins
          settings: ".claude/settings.json"
          claude_args: --model claude-opus-4-7 --allowed-tools "WebFetch,Read,Write,Edit,Glob,Bash,Skill"
          prompt: |
            /ingest ${{ github.event.issue.title }}

            追加情報:
            ${{ github.event.issue.body }}

      - name: Create Pull Request
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          BRANCH_NAME="add-scrap/issue-${ISSUE_NUMBER}-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"

          git add scraps/
          if git diff --cached --quiet; then
            echo "No changes to commit (ingest may have skipped)"
            exit 0
          fi
          git commit -m "Add scrap: ${ISSUE_TITLE}"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Add scrap: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --base main
