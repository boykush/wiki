name: RSS to Scrap PR

on:
  schedule:
    - cron: '0 0 * * *'  # 09:00 JST daily (target = previous JST day)
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD, JST). Default: yesterday.'
        required: false

permissions:
  contents: read

jobs:
  list-articles:
    runs-on: ubuntu-latest
    outputs:
      articles: ${{ steps.fetch.outputs.articles }}
      count: ${{ steps.fetch.outputs.count }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - id: fetch
        env:
          DATE_INPUT: ${{ inputs.date }}
        run: |
          if [ -n "$DATE_INPUT" ]; then
            ARTICLES=$(mise run fetch-rss -- --date "$DATE_INPUT")
          else
            ARTICLES=$(mise run fetch-rss)
          fi
          {
            echo "articles<<RSSEOF"
            echo "$ARTICLES"
            echo "RSSEOF"
          } >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$ARTICLES" | jq 'length')" >> "$GITHUB_OUTPUT"

  create-scrap:
    needs: list-articles
    if: needs.list-articles.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        article: ${{ fromJson(needs.list-articles.outputs.articles) }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Setup Scraps
        uses: boykush/scraps@a8bf05b091898d347535c052707d7b77b2a74274 # v1.0.1

      - name: Fetch article body
        env:
          ARTICLE_URL: ${{ matrix.article.url }}
        run: |
          mise run fetch-article-body -- --url "$ARTICLE_URL" > article-body.md
          echo "fetched $(wc -c < article-body.md) bytes"

      - name: Run Claude with ingest skill
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/boykush/scraps.git
          plugins: |
            scraps@scraps-claude-code-plugins
          settings: ".claude/settings.json"
          claude_args: --allowed-tools "WebFetch,Read,Write,Edit,Glob,Bash,Skill"
          prompt: |
            /ingest ${{ matrix.article.url }}

            これは RSS 由来のブログ記事です。記事本文を作業ディレクトリの `article-body.md` に保存済み。
            まず Read で全文を読み、これを正確な情報源とすること（WebFetch の要約に頼らない）。
            `article-body.md` が空または極端に短い場合のみ WebFetch で全文を取得する。
            取り込み時のローカル規約:
            - タイトルは記事タイトル「${{ matrix.article.title }}」をそのまま使う（ファイル名に使えない文字のみ最小変換）
            - 記事内容を既存の概念 scrap に混ぜ込まず、独立した記事 scrap を作る
            - 本文末尾に `[[Blog|ブログ]]` を置いて [[Blog]] に集約する

      - name: Create Pull Request
        env:
          ARTICLE_TITLE: ${{ matrix.article.title }}
          ARTICLE_URL: ${{ matrix.article.url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          URL_HASH=$(printf '%s' "$ARTICLE_URL" | sha1sum | cut -c1-8)
          BRANCH_NAME="add-scrap/rss-${URL_HASH}-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"

          git add scraps/
          if git diff --cached --quiet; then
            echo "No changes to commit (web-to-scrap may have skipped)"
            exit 0
          fi
          git commit -m "Add scrap from RSS: ${ARTICLE_TITLE}"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Add scrap from RSS: ${ARTICLE_TITLE}" \
            --body "Source: ${ARTICLE_URL}" \
            --base main \
            --reviewer boykush
